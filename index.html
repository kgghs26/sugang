<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>2026 경기여고 수강신청 로드맵</title>

<!-- 폰트: 본문/UI = Pretendard, 디스플레이 제목 = Nanum Myeongjo -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />

<!-- 화면 캡처 → PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
  /* ===== 디자인 토큰 ===== */
  :root{
    --ink:#1c2b46;          /* 본문/제목 잉크 네이비 */
    --ink-soft:#54627c;     /* 보조 텍스트 */
    --paper:#faf8f2;        /* 따뜻한 종이 배경 */
    --paper-2:#f2eee2;      /* 카드 안쪽 */
    --line:#ddd7c8;         /* 얇은 괘선 */
    --line-strong:#bcb4a0;  /* 강한 괘선 */

    --sel:#1f6f6b;          /* 선택됨(틸) */
    --sel-bg:#e2efee;
    --alert:#b3261e;        /* 미충족(붉은색) */
    --alert-bg:#fbe9e7;
    --ok:#1f7a4d;           /* 충족(녹색) */
    --ok-bg:#e6f3ec;
    --warn:#b07a1e;         /* 부족/초과(앰버) */
    --warn-bg:#f6efe0;

    /* 과목 유형별 색 */
    --t-ilban:#6b7280;      /* ■ 일반선택 */
    --t-jinro:#1f6f6b;      /* ● 진로선택 */
    --t-yunghap:#b07a1e;    /* ▲ 융합선택 */
    --t-sayung:#7a5ea8;     /* △ 사회·과학 융합선택 */

    --font-disp:"Nanum Myeongjo", "Apple SD Gothic Neo", serif;
    --font-body:"Pretendard","Pretendard Variable","Apple SD Gothic Neo",system-ui,sans-serif;
  }

  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; }
  body{
    font-family:var(--font-body);
    color:var(--ink);
    background:
      radial-gradient(circle at 50% -10%, #fffefb 0%, var(--paper) 55%);
    line-height:1.45;
    -webkit-font-smoothing:antialiased;
  }

  .wrap{ max-width:1360px; margin:0 auto; padding:28px 22px 80px; }

  /* ===== 헤더 ===== */
  .masthead{
    border-bottom:2.5px solid var(--ink);
    padding-bottom:14px; margin-bottom:8px;
    display:flex; align-items:flex-end; justify-content:space-between; gap:20px; flex-wrap:wrap;
  }
  .masthead .eyebrow{
    font-size:12.5px; letter-spacing:.14em; color:var(--ink-soft);
    font-weight:600; text-transform:none; margin-bottom:6px;
  }
  .masthead h1{
    font-family:var(--font-disp); font-weight:800;
    font-size:clamp(26px,3.4vw,40px); margin:0; letter-spacing:-.01em;
  }
  .masthead h1 .yr{ color:var(--sel); }
  .ident{
    display:flex; align-items:center; gap:10px;
    font-size:13px; color:var(--ink-soft);
  }
  .ident label{ font-weight:600; color:var(--ink); }
  .ident input{
    font-family:var(--font-body); font-size:13.5px; color:var(--ink);
    border:none; border-bottom:1.5px solid var(--line-strong);
    background:transparent; padding:4px 6px; width:150px;
  }
  .ident input:focus{ outline:none; border-bottom-color:var(--sel); }
  .ident .date{ font-variant-numeric:tabular-nums; }

  /* 규칙 요약 + 범례 */
  .ribbon{
    display:flex; justify-content:center; align-items:center; gap:18px;
    flex-wrap:wrap; margin:14px 0 22px; padding:10px 16px;
    background:var(--paper-2); border:1px solid var(--line);
    border-radius:10px;
  }
  .rules{ font-size:13px; color:var(--ink-soft); display:flex; gap:18px; flex-wrap:wrap; }
  .rules b{ color:var(--ink); font-weight:700; }
  .legend{ display:flex; gap:14px; flex-wrap:wrap; font-size:12.5px; }
  .legend span{ display:inline-flex; align-items:center; gap:5px; color:var(--ink-soft); }
  .legend .mk{ font-weight:800; font-size:13px; }
  .mk.ilban{ color:var(--t-ilban); }
  .mk.jinro{ color:var(--t-jinro); }
  .mk.yunghap{ color:var(--t-yunghap); }
  .mk.sayung{ color:var(--t-sayung); }

  /* ===== 본문 레이아웃: 펼침면 + 패널 ===== */
  .layout{ display:flex; gap:20px; align-items:flex-start; }

  /* 펼침면: 학기 4단을 한 줄로 */
  .spread{
    flex:1 1 auto; min-width:0;
    display:flex; align-items:stretch;
    background:#fff;
    border:1px solid var(--line-strong);
    border-radius:12px;
    box-shadow:0 18px 40px -28px rgba(28,43,70,.5);
    overflow:visible;            /* 헤더 sticky가 화면에 고정되도록 (hidden 금지) */
  }
  .spread.scroll{ overflow-x:auto; }

  /* overflow를 없앤 대신 바깥 네 모서리만 라운딩 */
  .col:first-child{ border-bottom-left-radius:11px; }
  .col:last-child{ border-bottom-right-radius:11px; }
  .col:first-child .col-head{ border-top-left-radius:11px; }
  .col:last-child .col-head{ border-top-right-radius:11px; }

  .col{
    flex:1 1 0; min-width:228px;
    border-right:1px solid var(--line);
    display:flex; flex-direction:column;
    background:linear-gradient(#fff, #fffdf8);
  }
  .col:last-child{ border-right:none; }

  /* 책등(spine): 2학년 면 | 3학년 면 사이 접힘 */
  .spine{
    flex:0 0 22px; align-self:stretch;
    background:
      linear-gradient(90deg,
        rgba(0,0,0,.10), rgba(0,0,0,.02) 28%,
        rgba(255,255,255,0) 50%,
        rgba(0,0,0,.02) 72%, rgba(0,0,0,.10));
    border-left:1px solid var(--line-strong);
    border-right:1px solid var(--line-strong);
    position:relative;
  }
  .spine::after{
    content:""; position:absolute; inset:0 9px;
    border-left:1px dashed rgba(28,43,70,.18);
  }

  .col-head{
    position:sticky; top:0; z-index:2;
    background:var(--ink); color:#fff;
    padding:11px 14px 12px;
    text-align:center;
    box-shadow:0 6px 10px -6px rgba(28,43,70,.45);   /* 스크롤 시 본문 위에 떠 보이게 */
  }
  .sem-reset{
    position:absolute; top:8px; right:8px;
    font-family:var(--font-body); font-size:10px; font-weight:700;
    color:#cdd6e6; background:rgba(255,255,255,.12);
    border:1px solid rgba(255,255,255,.28); border-radius:6px;
    padding:2px 7px; cursor:pointer; line-height:1.5;
    transition:background .12s, color .12s;
  }
  .sem-reset:hover{ background:rgba(255,255,255,.24); color:#fff; }
  .sem-reset:active{ transform:translateY(1px); }
  .col-head .gterm{
    font-family:var(--font-disp); font-weight:800;
    font-size:17px; letter-spacing:.01em;
  }
  .col-head .pick{
    margin-top:5px; display:inline-flex; align-items:center; gap:7px;
    font-size:12px; color:#cdd6e6;
  }
  .col-head .count{
    font-variant-numeric:tabular-nums; font-weight:800; font-size:13px;
    padding:2px 10px; border-radius:999px;
    background:var(--alert); color:#fff;            /* 기본(미완료) = 붉은색 */
    transition:background .2s;
  }
  .col-head .count.ok{ background:var(--ok); }       /* 정원 채움 = 초록색 */
  .col-head .count.bad{ background:var(--alert); }
  .col-head .count.over{ background:var(--alert); }

  /* 학교 지정(필수) */
  .fixed{
    margin:10px 12px 4px; padding:9px 11px;
    background:repeating-linear-gradient(45deg,#f4f1e8,#f4f1e8 8px,#f0ece1 8px,#f0ece1 16px);
    border:1px dashed var(--line-strong); border-radius:8px;
  }
  .fixed .ttl{ font-size:11px; font-weight:700; color:var(--ink-soft); letter-spacing:.02em; margin-bottom:5px; }
  .fixed .items{ font-size:12.5px; color:var(--ink); line-height:1.6; }
  .fixed .lock{ opacity:.55; margin-right:3px; }

  .group{ padding:6px 12px 0; }
  .group + .group{ border-top:1px solid var(--line); margin-top:6px; padding-top:8px; }
  .group .gname{
    font-size:11.5px; font-weight:700; color:var(--ink-soft);
    letter-spacing:.04em; margin:2px 0 6px;
  }

  /* 과목 버튼 */
  .course{
    width:100%; text-align:left; cursor:pointer;
    display:flex; align-items:center; gap:8px;
    font-family:var(--font-body); font-size:13.5px; color:var(--ink);
    background:#fff; border:1.4px solid var(--line);
    border-radius:8px; padding:8px 10px; margin-bottom:6px;
    transition:border-color .12s, background .12s, transform .06s;
  }
  .course:hover{ border-color:var(--line-strong); }
  .course:active{ transform:scale(.99); }
  .course:focus-visible{ outline:2.5px solid var(--sel); outline-offset:2px; }
  .course:disabled{
    opacity:.42; cursor:not-allowed; filter:grayscale(.35);
    background:#f6f5f1; box-shadow:none;
  }
  .course:disabled:hover{ border-color:var(--line); }
  .course .mk{ font-weight:800; font-size:12px; flex:0 0 auto; }
  .course .nm{ flex:1 1 auto; }
  .course .box{
    flex:0 0 auto; width:17px; height:17px; border-radius:5px;
    border:1.6px solid var(--line-strong); display:grid; place-items:center;
    font-size:12px; color:#fff; background:#fff;
  }
  .course[aria-pressed="true"]{
    border-color:var(--sel); background:var(--sel-bg);
    box-shadow:inset 3px 0 0 var(--sel);
    font-weight:600;
  }
  .course[aria-pressed="true"] .box{ background:var(--sel); border-color:var(--sel); }

  /* ===== 충족여부 패널 (붉은색 섹션) ===== */
  .panel{
    flex:0 0 234px; align-self:flex-start;
    position:sticky; top:18px;
    background:#fff; border:2px solid var(--alert); border-radius:12px;
    overflow:hidden; box-shadow:0 18px 40px -30px rgba(179,38,30,.7);
  }
  .panel.done{ border-color:var(--ok); box-shadow:0 18px 40px -30px rgba(31,122,77,.6); }
  .panel-head{
    background:var(--alert); color:#fff; padding:9px 13px;
    transition:background .2s;
  }
  .panel.done .panel-head{ background:var(--ok); }
  .panel-head .ph-t{ font-weight:800; font-size:14px; letter-spacing:.01em; }
  .panel-head .ph-s{ font-size:11px; opacity:.92; margin-top:2px; line-height:1.3; }

  .panel-body{ padding:8px 10px 10px; }
  .sec-label{
    font-size:10px; font-weight:700; letter-spacing:.05em; color:var(--ink-soft);
    margin:8px 2px 4px; text-transform:none;
  }
  .sec-label:first-child{ margin-top:1px; }

  .chk{
    display:flex; align-items:center; gap:7px;
    padding:4px 8px; border-radius:8px; margin-bottom:4px;
    border:1px solid var(--line); background:#fff;
    transition:background .15s, border-color .15s;
  }
  .chk .ico{
    flex:0 0 auto; width:16px; height:16px; border-radius:50%;
    display:grid; place-items:center; font-size:10.5px; font-weight:800; color:#fff;
  }
  /* 라벨은 필요 시 줄바꿈(예: 기가·정보 + 제2외국어), 숫자는 바로 옆에 붙도록 */
  .chk .label{ flex:1 1 auto; font-size:12px; line-height:1.25; color:var(--ink); }
  .chk .val{ flex:0 0 auto; font-variant-numeric:tabular-nums; font-weight:800; font-size:12.5px; }

  .chk.s-ok{ background:var(--ok-bg); border-color:#bfe2cd; }
  .chk.s-ok .ico{ background:var(--ok); }
  .chk.s-ok .val{ color:var(--ok); }
  .chk.s-bad{ background:var(--alert-bg); border-color:#f2c9c4; }
  .chk.s-bad .ico{ background:var(--alert); }
  .chk.s-bad .val{ color:var(--alert); }
  .chk.s-warn{ background:var(--warn-bg); border-color:#e6d4ab; }
  .chk.s-warn .ico{ background:var(--warn); }
  .chk.s-warn .val{ color:var(--warn); }
  .chk.s-info{ background:#f6f5f1; }
  .chk.s-info .ico{ background:#9aa3b2; }
  .chk.s-info .val{ color:var(--ink-soft); }

  /* ===== 하단/플로팅 액션 ===== */
  .toolbar{
    position:fixed; right:22px; bottom:80px; z-index:30;  /* 미니바 위에 위치 */
    display:flex; gap:10px;
  }
  .btn{
    font-family:var(--font-body); font-size:14px; font-weight:700;
    border:none; border-radius:10px; padding:12px 18px; cursor:pointer;
    display:inline-flex; align-items:center; gap:8px;
    box-shadow:0 10px 24px -10px rgba(28,43,70,.55);
    transition:transform .08s, opacity .15s;
  }
  .btn:active{ transform:translateY(1px); }
  .btn-primary{ background:var(--ink); color:#fff; }
  .btn-ghost{ background:#fff; color:var(--ink); border:1.5px solid var(--line-strong); }
  .btn:disabled{ opacity:.55; cursor:default; }

  .note{
    margin-top:26px; font-size:12.5px; color:var(--ink-soft);
    border-top:1px solid var(--line); padding-top:14px; line-height:1.7;
  }
  .note b{ color:var(--ink); }

  /* ===== 캡처 중 임시 스타일 ===== */
  body.capturing .no-print{ display:none !important; }
  body.capturing .col-head{ position:static !important; }
  body.capturing .spread{ overflow:visible !important; }
  /* 잉크 절약: 어두운 학기 헤더 → 흰 배경 + 네이비 글씨로 반전 (이 부분만) */
  body.capturing .col-head{
    background:#fff !important; color:var(--ink) !important;
    border-bottom:1.5px solid var(--line-strong); box-shadow:none !important;
  }
  body.capturing .col-head .gterm{ color:var(--ink) !important; }
  body.capturing .col-head .pick{ color:var(--ink-soft) !important; }

  /* PDF에서는 범례를 숨기고(상단 요약으로 대체) */
  body.capturing .ribbon{ display:none !important; }

  /* PDF 캡처는 모바일이어도 데스크톱(4학기 한 줄) 레이아웃으로 통일 */
  body.capturing .layout{ flex-direction:row !important; gap:0 !important; }
  body.capturing .spread{
    display:flex !important; grid-template-columns:none !important;
    gap:0 !important; width:auto !important;
    background:#fff !important; border:1px solid var(--line-strong) !important;
    border-radius:12px !important; box-shadow:none !important;
  }
  body.capturing .spine{ display:block !important; }
  body.capturing .col{
    min-width:228px !important; border:0 !important;
    border-right:1px solid var(--line) !important;
    border-radius:0 !important; box-shadow:none !important; overflow:visible !important;
  }
  body.capturing .col:last-child{ border-right:0 !important; }

  /* ===== PDF 전용: 교과군 필수요건 요약 ===== */
  .print-only{ display:none; }
  body.capturing .print-only{ display:flex; }
  #printSummary{
    align-items:center; gap:14px; margin:8px 0 16px;
    padding:9px 15px; border:1.5px solid var(--line-strong); border-radius:9px;
    background:#fff; flex-wrap:wrap;
  }
  #printSummary .ps-title{ font-weight:800; font-size:13px; color:var(--ink); }
  #printSummary .ps-items{ display:flex; gap:9px; flex-wrap:wrap; }
  #printSummary .ps-item{
    font-weight:700; font-size:12.5px; padding:3px 11px;
    border-radius:999px; border:1.5px solid;
  }
  #printSummary .ps-item.ok{ color:var(--ok); border-color:var(--ok); background:var(--ok-bg); }
  #printSummary .ps-item.bad{ color:var(--alert); border-color:var(--alert); background:var(--alert-bg); }

  /* ===== 하단 고정 미니바 (교과군 필수요건) — 모바일·데스크톱 공통 ===== */
  .statusbar{
    display:flex; position:fixed; left:0; right:0; bottom:0; z-index:40;
    gap:10px; padding:9px 14px 11px; justify-content:center; align-items:center;
    background:rgba(255,255,255,.96); -webkit-backdrop-filter:blur(8px); backdrop-filter:blur(8px);
    border-top:2.5px solid var(--alert);
    box-shadow:0 -12px 26px -18px rgba(28,43,70,.5);
  }
  .statusbar.done{ border-top-color:var(--ok); }
  .sb-chip{
    flex:1 1 0; max-width:190px;
    display:flex; flex-direction:column; align-items:center;
    gap:1px; padding:4px 6px; border-radius:9px; line-height:1.2;
    background:var(--alert-bg); color:var(--alert);
  }
  .sb-chip.ok{ background:var(--ok-bg); color:var(--ok); }
  .sb-chip .v{ font-weight:800; font-size:14px; font-variant-numeric:tabular-nums; }
  .sb-chip .l{ font-weight:600; font-size:10.5px; opacity:.9; }

  /* 하단 고정 미니바에 가리지 않도록 전역 여백 */
  body{ padding-bottom:74px; }

  /* ===== 반응형 =====
     960px 이하: 책 펼침면(가로 4단)을 풀고 세로로 적층.
       · 학기 테이블: 2학기씩(2열) → 680px 이하에서 1학기씩(1열)
       · 버튼은 흐름 맨 아래에 배치 (미니바는 전 화면 하단 고정) */
  @media (max-width: 960px){
    .layout{ flex-direction:column; gap:16px; }
    .spread{
      order:1; width:100%;
      display:grid; grid-template-columns:1fr 1fr; gap:14px;
      background:transparent; border:none; box-shadow:none; overflow:visible;
    }
    .spread.scroll{ overflow:visible; }
    .spine{ display:none; }              /* 책등은 펼침면(가로)일 때만 */
    .col{
      min-width:0;
      border:1px solid var(--line-strong); border-radius:12px; overflow:hidden;
      box-shadow:0 12px 30px -24px rgba(28,43,70,.45);
    }
    .col-head{ position:static; }        /* 적층 시 헤더 겹침 방지 */
    .toolbar{                            /* 버튼: 고정 해제 → 페이지 맨 아래 흐름 */
      position:static; justify-content:center; gap:12px;
      max-width:1360px; margin:0 auto; padding:4px 22px 36px;
    }
    .toolbar .btn{ flex:1 1 0; max-width:240px; justify-content:center; padding:14px 18px; }
  }
  @media (max-width: 680px){
    .spread{ grid-template-columns:1fr; }  /* 1학기씩 */
  }
  @media (prefers-reduced-motion: reduce){
    *{ transition:none !important; }
  }
</style>
</head>
<body>
<div class="wrap">

  <!-- 캡처 대상 시작 -->
  <div id="capture">

    <header class="masthead">
      <div>
        <div class="eyebrow">경기여자고등학교 · 나의 진로설계와 수강신청</div>
        <h1><span class="yr">2026</span>학년도 입학생 수강신청 로드맵</h1>
      </div>
      <div class="ident">
        <label for="who">학번/이름</label>
        <input id="who" type="text" placeholder="10101 김경기" autocomplete="off" />
        <span class="date" id="today"></span>
      </div>
    </header>

    <div class="ribbon">
      <div class="legend">
        <span><i class="mk ilban">■</i>일반선택</span>
        <span><i class="mk jinro">●</i>진로선택</span>
        <span><i class="mk yunghap">▲</i>융합선택</span>
        <span><i class="mk sayung">▲</i>사회·과학 융합선택</span>
      </div>
    </div>

    <!-- PDF 저장 시에만 표시 (상단, 범례 자리). 웹 화면에서는 숨김 -->
    <div id="printSummary" class="print-only">
      <span class="ps-title">교과군 필수요건 충족</span>
      <span id="psItems" class="ps-items"></span>
    </div>

    <div class="layout">
      <!-- 펼침면: JS가 학기 4단 + 책등을 채움 -->
      <div class="spread" id="spread"></div>

    </div>

  </div>
  <!-- 캡처 대상 끝 -->

  <p class="note">
    이 페이지는 <b>가상의 수강신청 연습</b>입니다. 실제 수강신청은 리로스쿨 &gt; 교육과정 &gt; 수강신청에서 진행합니다.
    학교 지정 과목(필수)은 별도로 선택하지 않으며, 위 조건의 과목 수에 포함되지 않습니다.<br>실제 수강신청은 <b> 학년 단위 </b>로 이루어집니다.
  </p>

</div>

<div class="toolbar no-print">
  <button class="btn btn-ghost" id="resetBtn" type="button">선택 초기화</button>
  <button class="btn btn-primary" id="pdfBtn" type="button">PDF로 저장</button>
</div>

<!-- 화면 하단 고정 미니바: 교과군 필수요건만 표시 (모바일/데스크톱 공통) -->
<div class="statusbar no-print" id="statusbar" aria-label="교과군 필수 조건 충족 현황"></div>

<script>
/* =========================================================
   1) 과목 데이터 (2026학년도 입학생 가이드북 기준)
   t: ilban(■) / jinro(●) / yunghap(▲) / sayung(△)
   ========================================================= */
const TYPE = {
  ilban:   { mk:"■", cls:"ilban" },
  jinro:   { mk:"●", cls:"jinro" },
  yunghap: { mk:"▲", cls:"yunghap" },
  sayung:  { mk:"▲", cls:"sayung" },
};

// 교과 → 충족 판정용 카테고리
function catOf(subject){
  if(subject==="국어"||subject==="수학"||subject==="영어") return "KME"; // 국수영 합계
  if(subject==="사회") return "SOC";
  if(subject==="과학") return "SCI";
  if(subject==="기술·가정/정보") return "TECH";
  if(subject==="제2외국어/한문") return "LANG";
  if(subject==="예술") return "ART";
  return "ETC";
}

const SEMESTERS = [
  {
    id:"s21", title:"2학년 1학기", need:5, side:"left",

    groups:[

      { subject:"영어", courses:[ ["영미 문학 읽기","jinro"] ] },
      { subject:"사회", courses:[
        ["세계시민과 지리","ilban"],["현대사회와 윤리","ilban"],
        ["법과 사회","jinro"],["동아시아 역사 기행","jinro"],
        ["금융과 경제생활","sayung"] ] },
      { subject:"과학", courses:[
        ["물리학","ilban"],["화학","ilban"],["지구과학","ilban"],
        ["세포와 물질대사","jinro"] ] },
      { subject:"기술·가정/정보", courses:[ ["데이터 과학","jinro"] ] },
      { subject:"제2외국어/한문", courses:[ ["스페인어","ilban"],["일본어","ilban"] ] },
      { subject:"예술", courses:[ ["음악 연주와 창작","jinro"],["미술 창작","jinro"] ] },
    ]
  },
  {
    id:"s22", title:"2학년 2학기", need:5, side:"left",
    fixed:["독서와 작문","미적분Ⅰ","영어Ⅱ","스포츠생활2"],
    groups:[
      { subject:"국어", courses:[ ["문학과 영상","jinro"] ] },
      { subject:"수학", courses:[ ["인공지능 수학","jinro"] ] },
      { subject:"영어", courses:[ ["세계 문화와 영어","yunghap"] ] },
      { subject:"사회", courses:[
        ["사회와 문화","ilban"],["세계사","ilban"],["정치","jinro"],
        ["윤리문제 탐구","sayung"],["기후변화와 지속가능한 세계","sayung"] ] },
      { subject:"과학", courses:[
        ["생명과학","ilban"],["역학과 에너지","jinro"],
        ["물질과 에너지","jinro"],["지구시스템과학","jinro"] ] },
      { subject:"기술·가정/정보", courses:[ ["아동발달과 부모","yunghap"] ] },
      { subject:"제2외국어/한문", courses:[ ["스페인어 회화","jinro"],["일본어 회화","jinro"] ] },
      { subject:"예술", courses:[ ["음악 감상과 비평","jinro"],["미술 감상과 비평","jinro"] ] },
    ]
  },
  {
    id:"s31", title:"3학년 1학기", need:6, side:"right",
    fixed:["화법과 언어","확률과 통계","영어 독해와 작문","스포츠 문화"],
    groups:[
      { subject:"국어", courses:[ ["독서 토론과 글쓰기","yunghap"] ] },
      { subject:"수학", courses:[ ["미적분Ⅱ","jinro"],["수학과제 탐구","yunghap"] ] },
      { subject:"영어", courses:[ ["심화 영어","jinro"] ] },
      { subject:"사회", courses:[
        ["윤리와 사상","jinro"],["경제","jinro"],["한국지리 탐구","jinro"],
        ["사회문제 탐구","sayung"],["역사로 탐구하는 현대 세계","sayung"] ] },
      { subject:"과학", courses:[
        ["전자기와 양자","jinro"],["화학 반응의 세계","jinro"],
        ["생물의 유전","jinro"],["행성우주과학","jinro"],
        ["융합과학 탐구","sayung"] ] },
      { subject:"기술·가정/정보", courses:[ ["소프트웨어와 생활","yunghap"] ] },
      { subject:"제2외국어/한문", courses:[ ["일본 문화","yunghap"] ] },
      { subject:"예술", courses:[ ["음악과 미디어","yunghap"],["미술과 매체","yunghap"] ] },
    ]
  },
  {
    id:"s32", title:"3학년 2학기", need:9, side:"right",
    fixed:["스포츠 과학"],
    groups:[
      { subject:"국어", courses:[ ["매체 의사소통","yunghap"],["언어생활 탐구","yunghap"] ] },
      { subject:"수학", courses:[ ["수학과 문화","yunghap"],["실용 통계","yunghap"] ] },
      { subject:"영어", courses:[ ["심화 영어 독해와 작문","jinro"],["미디어 영어","yunghap"] ] },
      { subject:"사회", courses:[
        ["국제 관계의 이해","jinro"],["인문학과 윤리","jinro"],
        ["도시의 미래 탐구","jinro"],["여행지리","sayung"] ] },
      { subject:"과학", courses:[
        ["과학의 역사와 문화","sayung"],["기후변화와 환경생태","sayung"] ] },
      { subject:"기술·가정/정보", courses:[ ["지식 재산 일반","yunghap"] ] },
      { subject:"제2외국어/한문", courses:[ ["스페인어권 문화","yunghap"],["심화 일본어","jinro"] ] },
      { subject:"예술", courses:[ ["음악콘텐츠 제작 기초","jinro"],["조형탐구1(변경예정)","jinro"] ] },
    ]
  },
];

/* =========================================================
   2) 상태 + 펼침면 렌더링
   ========================================================= */
const selected = new Set();         // key: `${semId}::${courseName}`
const key = (sem, name) => sem + "::" + name;

function buildSpread(){
  const spread = document.getElementById("spread");
  SEMESTERS.forEach((sem, idx) => {
    // 2학년 면과 3학년 면 사이에 책등 삽입
    if(idx === 2){
      const spine = document.createElement("div");
      spine.className = "spine";
      spread.appendChild(spine);
    }

    const col = document.createElement("div");
    col.className = "col";
    col.dataset.sem = sem.id;

    // 학기 헤더
    const head = document.createElement("div");
    head.className = "col-head";
    head.innerHTML =
      `<button class="sem-reset no-print" type="button" title="이 학기 선택 초기화">↺ 초기화</button>
       <div class="gterm">${sem.title}</div>
       <div class="pick">택 ${sem.need} ·
         <span class="count" id="cnt-${sem.id}">0 / ${sem.need}</span>
       </div>`;
    head.querySelector(".sem-reset").addEventListener("click", () => resetSemester(sem.id));
    col.appendChild(head);

    // 학교 지정(필수)
    const fixed = document.createElement("div");
    fixed.className = "fixed";
    fixed.innerHTML =
      `<div class="ttl">학교 지정 (필수 · 선택 제외)</div>
       <div class="items">` +
      sem.fixed.map(f => `<span class="lock">🔒</span>${f}`).join("&nbsp;&nbsp;") +
      `</div>`;
    col.appendChild(fixed);

    // 교과 그룹 + 과목
    sem.groups.forEach(g => {
      const grp = document.createElement("div");
      grp.className = "group";
      grp.innerHTML = `<div class="gname">${g.subject}</div>`;
      g.courses.forEach(([name, t]) => {
        const ty = TYPE[t];
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "course";
        btn.setAttribute("aria-pressed", "false");
        btn.dataset.sem = sem.id;
        btn.dataset.name = name;
        btn.dataset.cat = catOf(g.subject);
        btn.innerHTML =
          `<span class="mk ${ty.cls}">${ty.mk}</span>
           <span class="nm">${name}</span>
           <span class="box">✓</span>`;
        btn.addEventListener("click", () => toggle(btn, sem.id, name));
        grp.appendChild(btn);
      });
      col.appendChild(grp);
    });

    spread.appendChild(col);
  });
}

function toggle(btn, semId, name){
  const k = key(semId, name);
  if(selected.has(k)){ selected.delete(k); btn.setAttribute("aria-pressed","false"); }
  else { selected.add(k); btn.setAttribute("aria-pressed","true"); }
  recompute();
}

/* =========================================================
   3) 충족 판정 + 패널 렌더링
   ========================================================= */
function recompute(){
  // 학기별 선택 수
  const semCount = {};
  SEMESTERS.forEach(s => semCount[s.id] = 0);
  // 카테고리별 누적
  const cat = { KME:0, SOC:0, SCI:0, TECH:0, LANG:0, ART:0 };

  document.querySelectorAll('.course[aria-pressed="true"]').forEach(btn => {
    semCount[btn.dataset.sem]++;
    cat[btn.dataset.cat]++;
  });

  // --- 학기 헤더 배지(미완료=빨강 / 정원 채움=초록) + 정원 도달 시 미선택 과목 비활성화 ---
  SEMESTERS.forEach(s => {
    const c = semCount[s.id];
    const el = document.getElementById("cnt-" + s.id);
    el.textContent = `${c} / ${s.need}`;
    const done = (c === s.need);
    el.classList.toggle("ok", done);     // 초록 = 정원 충족
    el.classList.toggle("bad", !done);   // 빨강 = 미완료

    // 정원에 도달하면 아직 선택하지 않은 과목은 더 누를 수 없게 비활성화
    // (이미 선택한 과목은 해제할 수 있도록 활성 상태 유지)
    const atLimit = c >= s.need;
    document.querySelectorAll('.course[data-sem="' + s.id + '"]').forEach(btn => {
      const isSel = btn.getAttribute("aria-pressed") === "true";
      btn.disabled = atLimit && !isSel;
    });
  });

  // --- 교과군 필수요건: 하단 미니바 + PDF 요약에 표시 ---
  const techLang = cat.TECH + cat.LANG;
  const kmeOk = cat.KME <= 8;     // 국·수·영 합계 8과목 "이하"
  const tlOk  = techLang >= 4;    // 기가/정보 + 제2외국어 4과목 "이상"
  const artOk = cat.ART >= 2;     // 예술 2과목 "이상"

  // ⬇ = 이하(최대) 조건, ⬆ = 이상(최소) 조건
  const reqs = [
    { ok:kmeOk, label:"국·수·영",        val:`${cat.KME}/8⬇` },
    { ok:tlOk,  label:"기가/정보 외국어", val:`${techLang}/4⬆` },
    { ok:artOk, label:"예술",            val:`${cat.ART}/2⬆` },
  ];

  // 하단 미니바
  const sb = document.getElementById("statusbar");
  sb.classList.toggle("done", kmeOk && tlOk && artOk);
  sb.innerHTML = reqs.map(r => sbChip(r.ok, r.label, r.val)).join("");

  // PDF 저장 시 출력되는 요약
  document.getElementById("psItems").innerHTML = reqs.map(r =>
    `<span class="ps-item ${r.ok ? "ok" : "bad"}">${r.ok ? "✓" : "✗"} ${r.label} ${r.val}</span>`
  ).join("");
}

// 현황바 칩 (충족=녹색 ✓ / 미충족=붉은색 ✗)
function sbChip(ok, label, val){
  return `<span class="sb-chip ${ok ? "ok" : ""}">
    <span class="v">${ok ? "✓" : "✗"} ${val}</span>
    <span class="l">${label}</span>
  </span>`;
}

/* =========================================================
   4) 초기화 / 날짜 / PDF 저장
   ========================================================= */
function resetAll(){
  selected.clear();
  document.querySelectorAll('.course[aria-pressed="true"]')
    .forEach(b => b.setAttribute("aria-pressed","false"));
  recompute();
}

// 특정 학기만 초기화
function resetSemester(semId){
  document.querySelectorAll('.course[data-sem="' + semId + '"][aria-pressed="true"]')
    .forEach(b => {
      selected.delete(key(semId, b.dataset.name));
      b.setAttribute("aria-pressed","false");
    });
  recompute();
}

function setToday(){
  const d = new Date();
  const s = `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,"0")}.${String(d.getDate()).padStart(2,"0")}`;
  document.getElementById("today").textContent = s;
}

async function exportPDF(){
  const btn = document.getElementById("pdfBtn");
  const orig = btn.textContent;
  btn.disabled = true; btn.textContent = "PDF 만드는 중…";

  // input 값이 캡처에 보이도록 속성으로 고정
  const who = document.getElementById("who");
  who.setAttribute("value", who.value);

  const target = document.getElementById("capture");
  const FORCE_W = 1320;                 // 데스크톱 펼침면 기준 폭
  const prevWidth = target.style.width;
  target.style.width = FORCE_W + "px";  // 모바일이어도 데스크톱 레이아웃으로 캡처
  document.body.classList.add("capturing");

  try{
    const canvas = await html2canvas(target, {
      scale: 2,
      backgroundColor: "#ffffff",
      useCORS: true,
      windowWidth: FORCE_W,
      windowHeight: Math.max(target.scrollHeight, 900),
    });
    const imgData = canvas.toDataURL("image/jpeg", 0.95);
    const { jsPDF } = window.jspdf;

    // 인쇄용 A4(세로) 한 장에 비율 유지하며 맞춰 배치, 여백은 좁게
    const pdf = new jsPDF({ orientation: "portrait", unit: "pt", format: "a4" });
    const pageW = pdf.internal.pageSize.getWidth();   // ≈ 595pt
    const pageH = pdf.internal.pageSize.getHeight();  // ≈ 842pt
    const margin = 14;                                 // 좁은 여백
    const availW = pageW - margin * 2;
    const availH = pageH - margin * 2;

    const ratio = canvas.width / canvas.height;
    let drawW = availW;                  // 폭을 꽉 채워 최대한 크게
    let drawH = drawW / ratio;
    if(drawH > availH){ drawH = availH; drawW = drawH * ratio; } // 세로 넘치면 높이 기준
    const x = (pageW - drawW) / 2;       // 가로 가운데
    const y = margin;                    // 상단 정렬

    pdf.addImage(imgData, "JPEG", x, y, drawW, drawH);
    // 파일명: [학번이름]선택과목 로드맵_YYMMDD  (예: [10101김경기]선택과목 로드맵_260622)
    const idName = (who.value || "").trim().replace(/\s+/g, ""); // 공백 제거
    const d = new Date();
    const yymmdd = String(d.getFullYear()).slice(2)
                 + String(d.getMonth() + 1).padStart(2, "0")
                 + String(d.getDate()).padStart(2, "0");
    const fname = `${idName ? "[" + idName + "]" : ""}선택과목 로드맵_${yymmdd}`
                    .replace(/[\\/:*?"<>|]/g, "_");  // 파일명 사용 불가 문자만 치환
    pdf.save(fname + ".pdf");
  } catch(e){
    alert("PDF 생성 중 문제가 발생했습니다. 인터넷 연결을 확인하고 다시 시도해 주세요.");
    console.error(e);
  } finally{
    document.body.classList.remove("capturing");
    target.style.width = prevWidth;     // 임시 폭 원복
    btn.disabled = false; btn.textContent = orig;
  }
}

/* =========================================================
   5) 시작 + 가로 스크롤 필요 여부 판단
   ========================================================= */
function checkOverflow(){
  const spread = document.getElementById("spread");
  spread.classList.toggle("scroll", spread.scrollWidth > spread.clientWidth + 2);
}

buildSpread();
setToday();
recompute();
checkOverflow();
window.addEventListener("resize", checkOverflow);
document.getElementById("resetBtn").addEventListener("click", resetAll);
document.getElementById("pdfBtn").addEventListener("click", exportPDF);
</script>
